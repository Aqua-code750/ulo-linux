# a) Purpose: GitHub Actions workflow to automatically build the Ulo Linux ISO daily or on push.
# c) Install/Test: Pushed to GitHub repository. Runs via Actions.
# d) Open decisions: Triggering on push to main and daily via cron. Artifacts kept for 7 days.

name: Build Ulo Linux ISO

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * *' # Build nightly at 2 AM
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso base-devel git

      - name: Build ISO
        run: |
          # The profiledef.sh is in iso-profile/
          mkarchiso -v -w /tmp/archiso-tmp -o /tmp/archiso-out ./iso-profile

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ulo-linux-iso
          path: /tmp/archiso-out/*.iso
          retention-days: 7
