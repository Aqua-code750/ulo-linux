# a) Purpose: GitHub Actions workflow to automatically build the Ulo Linux ISO daily or on push.
# c) Install/Test: Pushed to GitHub repository. Runs via Actions.
# d) Open decisions: Triggering on push to main and daily via cron. Artifacts kept for 7 days.

name: Build Ulo Linux ISO

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * *' # Build nightly at 2 AM
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso base-devel git grub

      - name: Build ISO
        run: |
          # Copy the default Arch releng profile
          cp -r /usr/share/archiso/configs/releng ./ulo-iso-profile
          
          # Inject Ulo specific configuration and packages
          # We use sed to modify the original profiledef.sh instead of replacing it,
          # to preserve all internal file permissions required by mkarchiso.
          sed -i 's/iso_name="archlinux"/iso_name="ulo-linux"/' ./ulo-iso-profile/profiledef.sh
          sed -i 's/iso_label="ARCH_$(date +%Y%m)"/iso_label="ULO_$(date +%Y%m)"/' ./ulo-iso-profile/profiledef.sh
          sed -i 's/iso_publisher="Arch Linux <https:\/\/archlinux.org>"/iso_publisher="Ulo Linux <https:\/\/ulo.linux>"/' ./ulo-iso-profile/profiledef.sh
          sed -i 's/iso_application="Arch Linux Live\/Rescue CD"/iso_application="Ulo Linux Live\/Rescue CD"/' ./ulo-iso-profile/profiledef.sh
          
          # Append our custom packages
          cat ./iso-profile/packages.x86_64 >> ./ulo-iso-profile/packages.x86_64
          
          # Build the ISO
          mkarchiso -v -w /tmp/archiso-tmp -o /tmp/archiso-out ./ulo-iso-profile

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ulo-linux-iso
          path: /tmp/archiso-out/*.iso
          retention-days: 7
