name: Build Ulo Linux (Ubuntu Base)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Live Build
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin mtools syslinux-utils syslinux-common isolinux

      - name: Configure Live Build
        run: |
          mkdir -p build-iso
          cd build-iso
          
          # Initialize live-build config for Ubuntu Jammy (22.04 LTS)
          
          # Initialize live-build config for Ubuntu Jammy (22.04 LTS)
          lb config \
            --mode ubuntu \
            --distribution jammy \
            --bootloader grub-efi \
            --binary-images tar \
            --archive-areas "main restricted universe multiverse" \
            --linux-flavours generic \
            --linux-packages "linux-image linux-headers" \
            --bootappend-live "boot=casper quiet splash username=ulo user-fullname=Ulo ---" \
            --debian-installer false
            
          # Copy our custom configurations and apps into the build environment
          cp -r ../config/* config/
          
          mkdir -p config/includes.chroot/opt/
          cp -r ../apps config/includes.chroot/opt/ulo-apps

      - name: Build Ulo Apps (Electron)
        run: |
          cd ulo-welcome
          npm install
          npx -y electron-packager . ulo-welcome --platform=linux --arch=x64 --out=dist
          mkdir -p ../build-iso/config/includes.chroot/opt/ulo-welcome
          cp -r dist/ulo-welcome-linux-x64/* ../build-iso/config/includes.chroot/opt/ulo-welcome/
          cd ../ulo-store
          npm install
          npx -y electron-packager . ulo-store --platform=linux --arch=x64 --out=dist
          mkdir -p ../build-iso/config/includes.chroot/opt/ulo-store
          cp -r dist/ulo-store-linux-x64/* ../build-iso/config/includes.chroot/opt/ulo-store/
          cd ../ulo-assistant
          npm install
          npx -y electron-packager . ulo-assistant --platform=linux --arch=x64 --out=dist
          mkdir -p ../build-iso/config/includes.chroot/opt/ulo-assistant
          cp -r dist/ulo-assistant-linux-x64/* ../build-iso/config/includes.chroot/opt/ulo-assistant/
          cd ..

      - name: Build Ulo Linux ISO
        run: |
          cd build-iso
          sudo lb build
          
          # Unpack the raw root filesystem
          mkdir -p iso_root
          sudo tar -xf *.tar* -C iso_root/ || true
          
          # Manually construct the boot sectors
          sudo mkdir -p iso_root/boot/grub
          echo '
          set timeout=5
          set default=0
          menuentry "Start Ulo Linux" {
              linux /casper/vmlinuz boot=casper quiet splash username=ulo user-fullname=Ulo ---
              initrd /casper/initrd
          }
          ' | sudo tee iso_root/boot/grub/grub.cfg
          
          # Generate mathematically perfect Hybrid ISO using grub-mkrescue
          sudo grub-mkrescue -o ulo-linux.iso iso_root/

      - name: Split ISO for GitHub Releases (2GB limit)
        run: |
          cd build-iso
          split -b 1500M *.iso ulo-linux.iso.part
          rm *.iso

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0-alpha-${{ github.run_number }}"
          name: "Ulo Linux v1.0 Alpha (Build ${{ github.run_number }})"
          body: "Automated build of Ulo Linux. Note: Download all parts and use 'copy /b ulo-linux.iso.part* ulo-linux.iso' on Windows to combine them."
          files: build-iso/ulo-linux.iso.part*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
