<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulo Files</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <div class="cloud-status">
            <span class="indicator green"></span> Synced to Ulo Cloud
        </div>
        <ul>
            <li class="section-title">Quick Access</li>
            <li class="active">Home</li>
            <li>Documents</li>
            <li>Downloads</li>
            <li>Pictures</li>
            <li class="section-title">Cloud Drives</li>
            <li>Google Drive</li>
            <li>OneDrive</li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="top-bar">
            <div class="breadcrumb">
                <span>Home</span> > <span>Documents</span>
            </div>
            <input type="text" placeholder="Ask Agent: 'Find my tax PDFs from 2024'" class="search-bar agent-search">
        </div>
        
        <div class="file-grid">
            <div class="file-item folder">
                <div class="icon"></div>
                <span class="name">Projects</span>
            </div>
            <div class="file-item folder">
                <div class="icon"></div>
                <span class="name">Work</span>
            </div>
            <div class="file-item file pdf">
                <div class="icon"></div>
                <span class="name">Q3_Report.pdf</span>
            </div>
            <div class="file-item file image">
                <div class="icon"></div>
                <span class="name">screenshot.png</span>
            </div>
        </div>
    </div>
</body>
</html>
