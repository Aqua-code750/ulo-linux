# a) Purpose: Configures Alacritty to match the Ulo Design Language.
# c) Install/Test: Place in ~/.config/alacritty/alacritty.toml
# d) Open decisions: Using GPU acceleration (Alacritty default) which works perfectly with Ulo's QEMU virtio-gpu setup.

[window]
padding = { x = 12, y = 12 }
dynamic_padding = true
opacity = 0.85
blur = true
decorations = "None" # UloShell handles the window border and rounding

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size = 11.0

[colors.primary]
background = "#1a1b26"
foreground = "#a9b1d6"

[colors.normal]
black   = "#32344a"
red     = "#f7768e"
green   = "#00ff99" # Ulo Neon Green
yellow  = "#e0af68"
blue    = "#33ccff" # Ulo Neon Cyan
magenta = "#ad8ee6"
cyan    = "#449dab"
white   = "#787c99"

[colors.bright]
black   = "#444b6a"
red     = "#ff7a93"
green   = "#b9f27c"
yellow  = "#ff9e64"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#0db9d7"
white   = "#acb0d0"
