# a) Purpose: Nginx configuration optimized for hosting an Arch/Ulo pacman repository.
# c) Install/Test: Mounted via docker-compose.yml.
# d) Open decisions: Enabling autoindex to allow users to browse packages via web browser.

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  repo.ulo.linux;

        # The root directory containing 'x86_64' etc.
        root   /usr/share/nginx/html;

        # Enable directory listing so users can browse packages
        autoindex on;
        autoindex_exact_size off; # Human readable sizes
        autoindex_localtime on;

        # Cache control for DB files (they update often, do not cache)
        location ~ \.(db|db.tar.gz|db.tar.zst)$ {
            add_header Cache-Control "no-cache, must-revalidate, max-age=0";
        }

        # Cache control for packages (they never change, cache forever)
        location ~ \.pkg\.tar\.(zst|xz)$ {
            add_header Cache-Control "public, max-age=31536000";
        }
    }
}
