<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulo Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="assistant-container">
        <div class="header">
            <div class="logo">Ulo Assistant</div>
            <div>
                <button id="settings-btn" title="Settings">⚙️</button>
                <button id="hide-btn" title="Hide">✕</button>
            </div>
        </div>

        <div id="settings-modal" style="display: none; padding: 20px; border-bottom: 1px solid var(--border);">
            <p style="margin-bottom: 10px; font-size: 14px;">Gemini API Key:</p>
            <input type="password" id="api-key-input" style="width: 100%; padding: 8px; border-radius: 6px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white;" placeholder="AIzaSy...">
            <button id="save-key-btn" style="margin-top: 10px; padding: 8px 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer;">Save Key</button>
        </div>
        
        <div class="chat-area" id="chat-area">
            <div class="message system">
                Hi! I am the Ulo Assistant. How can I help you customize your Ulo Linux experience today?
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Ask me anything...">
            <button id="send-btn">➔</button>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
