# a) Purpose: Defines the window management rules and compositor settings for UloShell.
# c) Install/Test: Place in ~/.config/hyprland/hyprland.conf, test by launching `Hyprland`.
# d) Open decisions: Snap layouts are simulated using master layout combined with dispatcher bindings.

# UloShell Compositor Config (Hyprland based)

monitor=,preferred,auto,auto

# Execute Ulo UI Shell (AGS) on startup
exec-once = ags -c ~/.config/ags/config.js
# Execute Ulo Agent Daemon
exec-once = ulo-agentd

# Polkit & Wallpaper
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = swww init & swww img /usr/share/backgrounds/ulo-default.jpg

# --- Ulo Design Language (Corners, Blur, Colors) ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle # Dwindle represents Ulo's hybrid snap layout
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = on
    }
    drop_shadow = yes
    shadow_range = 20
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
    active_opacity = 0.95
    inactive_opacity = 0.85
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# --- Ulo Hybrid Window Management ---
dwindle {
    pseudotile = yes # Bound to mod+p
    preserve_split = yes
}

# --- Keybindings (Ulo standard) ---
$mainMod = SUPER

# Launch Ulo Terminal
bind = $mainMod, Return, exec, alacritty
# Kill active window
bind = $mainMod, Q, killactive, 
# Exit UloShell
bind = $mainMod SHIFT, M, exit, 
# Launch Ulo Files
bind = $mainMod, E, exec, thunar
# Toggle Float
bind = $mainMod, V, togglefloating, 
# Ulo App Launcher (AGS based)
bind = $mainMod, Space, exec, ags -t launcher
# Fullscreen
bind = $mainMod, F, fullscreen

# Snap Layouts (Windows 11 style simulation)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4

# Media & Volume Keys
bindel = , xf86audioraisevolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , xf86audiolowervolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , xf86audiomute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
